<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FITO6 ERP — Gym Management</title>
<style>
:root{--bg:#f4f6fa;--card:#fff;--ink:#1a2233;--mut:#6b7688;--brand:#ff6a00;--brand2:#ff8c33;--dark:#141b2d;--dark2:#1d2740;--ok:#18a558;--bad:#e0393e;--warn:#e8a10c;--line:#e6eaf2}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid #cdd5e1;border-radius:6px;width:100%;background:#fff}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand2);border-color:var(--brand)}
label{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px}
.field{margin-bottom:12px}
h2{font-size:20px;margin-bottom:4px} h3{font-size:15px;margin-bottom:10px}
.sub{color:var(--mut);font-size:12px}
/* LOGIN */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#141b2d,#26314e);display:flex;align-items:center;justify-content:center;z-index:100}
#login .box{background:#fff;border-radius:14px;padding:36px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{font-weight:800;font-size:26px;letter-spacing:1px}.logo span{color:var(--brand)}
/* LAYOUT */
#app{display:none;min-height:100vh}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:212px;background:var(--dark);color:#cfd6e4;overflow-y:auto;z-index:20}
#sidebar .logo{color:#fff;padding:18px 18px 10px;font-size:20px}
#sidebar .role{padding:0 18px 14px;font-size:11px;color:#7f8aa3}
#sidebar a{display:flex;gap:10px;align-items:center;padding:9px 18px;color:#cfd6e4;text-decoration:none;font-size:13px;border-left:3px solid transparent}
#sidebar a:hover{background:var(--dark2)}
#sidebar a.on{background:var(--dark2);color:#fff;border-left-color:var(--brand)}
#main{margin-left:212px;padding:0 22px 40px}
#topbar{display:flex;align-items:center;gap:14px;padding:14px 0;position:sticky;top:0;background:var(--bg);z-index:10}
#gsearch{max-width:340px}
#topbar .sp{flex:1}
.userchip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600}
.tb-ico{position:relative;background:#fff;border:1px solid var(--line);border-radius:50%;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.tb-ico .dot{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--bad);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.tb-drop{position:absolute;right:0;top:40px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.15);min-width:220px;display:none;z-index:30;padding:8px}
.tb-drop a,.tb-drop button{display:block;width:100%;text-align:left;padding:8px 12px;border:none;background:none;font-size:13px;color:var(--ink);text-decoration:none;border-radius:6px}
.tb-drop a:hover,.tb-drop button:hover{background:#f4f6fa}
.stat.clickable{cursor:pointer}.stat.clickable:hover{border-color:var(--brand)}
.photo-av{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--line);background:#eef1f6}
.linechart{width:100%;height:160px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .hd{font-size:11px;font-weight:700;color:var(--mut);text-align:center;padding:6px}
.cal .day{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:88px;padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:2px}
.cal .day:hover{border-color:var(--brand)}
.cal .day.mut{background:#f7f8fb;cursor:default;opacity:.55}
.cal .day .dn{font-size:11px;font-weight:800}
.cal .day .sm{font-size:10px;color:var(--mut);line-height:1.35}
.cal .day .fv{font-size:12px;font-weight:800;color:var(--brand);margin-top:auto}
.cal .day.has{background:#fff8f2;border-color:#ffd2b0}
input.caps{text-transform:uppercase}
.ro{background:#f4f6fa!important;color:var(--mut)}
/* CARDS/GRIDS */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g6{grid-template-columns:repeat(6,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px}
.stat .v{font-size:20px;font-weight:800;margin-top:2px}
.stat .l{font-size:11px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.stat.ok .v{color:var(--ok)}.stat.bad .v{color:var(--bad)}.stat.br .v{color:var(--brand)}.stat.warn .v{color:var(--warn)}
/* TABLE */
table{width:100%;border-collapse:collapse;background:#fff}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);text-align:left;padding:9px 10px;border-bottom:2px solid var(--line);background:#fafbfd}
td{padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px}
tr:hover td{background:#fbfcff}
.tbl{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:auto}
.r{text-align:right}.c{text-align:center}
/* BUTTONS/BADGES */
.btn{background:var(--brand);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-weight:600;font-size:13px}
.btn:hover{background:#e55f00}
.btn.sec{background:#fff;color:var(--ink);border:1px solid #cdd5e1}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.dgr{background:var(--bad)}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.b-ok{background:#e3f6ec;color:var(--ok)}.b-bad{background:#fdeaea;color:var(--bad)}.b-warn{background:#fdf3dd;color:#a97507}.b-mut{background:#eef1f6;color:var(--mut)}.b-br{background:#ffefe3;color:var(--brand)}
/* TABS / TOOLBAR */
.tabs{display:flex;gap:6px;margin:14px 0;flex-wrap:wrap}
.tabs button{background:#fff;border:1px solid #cdd5e1;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--mut)}
.tabs button.on{background:var(--dark);color:#fff;border-color:var(--dark)}
.toolbar{display:flex;gap:8px;align-items:end;flex-wrap:wrap;margin-bottom:12px}
.toolbar .field{margin:0}
/* CHART */
.bars{display:flex;align-items:flex-end;gap:6px;height:150px;padding-top:10px}
.bars .b{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;height:100%}
.bars .bar{width:100%;max-width:44px;background:linear-gradient(180deg,var(--brand2),var(--brand));border-radius:4px 4px 0 0;min-height:2px}
.bars .bar.g{background:linear-gradient(180deg,#3ecf8e,#18a558)}.bars .bar.r{background:linear-gradient(180deg,#f2777b,#e0393e)}
.bars .x{font-size:10px;color:var(--mut)}.bars .y{font-size:10px;font-weight:700}
/* MODAL */
#modalwrap{display:none;position:fixed;inset:0;background:rgba(15,20,35,.55);z-index:50;align-items:flex-start;justify-content:center;overflow:auto;padding:30px 10px}
#modal{background:#fff;border-radius:12px;max-width:860px;width:100%;padding:22px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
/* WIZARD */
.steps{display:flex;gap:8px;margin:14px 0 18px}
.steps div{flex:1;text-align:center;padding:8px;border-radius:8px;background:#eef1f6;color:var(--mut);font-size:12px;font-weight:700}
.steps div.on{background:var(--brand);color:#fff}
.steps div.done{background:#e3f6ec;color:var(--ok)}
/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--dark);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;display:none;z-index:99;box-shadow:0 8px 30px rgba(0,0,0,.3)}
/* PRINT */
#printarea{display:none}
@media print{ body *{visibility:hidden} #printarea,#printarea *{visibility:visible} #printarea{display:block;position:absolute;left:0;top:0;width:100%} }
.inv{max-width:720px;margin:auto;padding:26px;font-size:13px;color:#111}
.inv h1{font-size:22px}.inv table{margin:12px 0}.inv td,.inv th{border:1px solid #999;padding:6px 8px}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}
.mut{color:var(--mut)} .bold{font-weight:700} .big{font-size:16px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.clickable{cursor:pointer;color:#1554c0;font-weight:600}
@media(max-width:900px){.g4,.g6{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}#sidebar{width:60px}#sidebar .logo{font-size:11px;padding:12px 6px}#sidebar a span,#sidebar .role{display:none}#main{margin-left:60px}}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="logo">FITO<span>6</span> ERP</div>
    <div class="sub" style="margin-bottom:20px">Gym Management + Accounts + Cashbook</div>
    <div class="field"><label>Email</label><input id="lg_u" type="email" placeholder="you@company.com" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="lg_p" type="password" placeholder="Your password" autocomplete="current-password"></div>
    <button class="btn" style="width:100%" id="lg_btn" onclick="doLogin()">Login</button>
    <div class="sub" style="margin-top:14px;line-height:1.7" id="lg_hint">Data saves to your <b>Firestore</b> business database (cloud). Use your Fito6 admin/staff email login.</div>
    <div class="sub" style="margin-top:8px;color:var(--bad);display:none" id="lg_err"></div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="logo">FITO<span style="color:var(--brand)">6</span></div>
    <div class="role" id="sb_role"></div>
    <nav id="nav"></nav>
  </div>
  <div id="main">
    <div id="topbar">
      <input id="gsearch" placeholder="🔍 Search name / phone / invoice / member ID…" onkeydown="if(event.key==='Enter')doSearch()">
      <div class="sp"></div>
      <div style="position:relative">
        <button type="button" class="tb-ico" title="Bill notifications" onclick="toggleTbDrop('tb_bill_drop')">🔔<span class="dot" id="tb_bill_dot" style="display:none">0</span></button>
        <div class="tb-drop" id="tb_bill_drop"></div>
      </div>
      <div style="position:relative">
        <button type="button" class="tb-ico" title="Cash / Bank" onclick="toggleTbDrop('tb_cash_drop')">💰</button>
        <div class="tb-drop" id="tb_cash_drop">
          <a href="#" onclick="closeTbDrops();go('cashbook');return false">Cashbook</a>
          <a href="#" onclick="closeTbDrops();go('accounts');return false">Account / P&amp;L</a>
          <a href="#" onclick="closeTbDrops();go('expenses');return false">Expenses</a>
          <a href="#" onclick="closeTbDrops();filterCashMode('Cash');return false">Cash entries</a>
          <a href="#" onclick="closeTbDrops();filterCashMode('Bank Transfer');return false">Bank entries</a>
        </div>
      </div>
      <span class="userchip" id="tb_user"></span>
      <button class="btn sec sm" onclick="logout()">Logout</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modalwrap" onclick="if(event.target===this)closeModal()"><div id="modal"></div></div>
<div id="toast"></div>
<div id="printarea"></div>

<script>
/* ================= CLOUD API + DATABASE ================= */
const DBKEY='fito6_erp_v1';
const AUTHKEY='fito6_erp_auth';
let API_URL='http://localhost:4000/api';
let AUTH={token:null,businessId:null,user:null};
let db=null;
let _saveTimer=null;
let _cloudReady=false;

async function initApiConfig(){
 try{const r=await fetch('/fito6-config.json',{cache:'no-store'});if(r.ok){const j=await r.json();if(j.apiUrl)API_URL=j.apiUrl}}catch(e){}
 const override=localStorage.getItem('fito6_api_url');if(override)API_URL=override;
}

async function api(path,opts={}){
 const headers={'Content-Type':'application/json',...(opts.headers||{})};
 if(AUTH.token)headers.Authorization='Bearer '+AUTH.token;
 if(AUTH.businessId)headers['X-Business-Id']=AUTH.businessId;
 const res=await fetch(API_URL+path,{...opts,headers,body:opts.body!==undefined?JSON.stringify(opts.body):undefined});
 let json=null;try{json=await res.json()}catch(e){}
 if(!res.ok)throw new Error((json&&json.error)||('Request failed '+res.status));
 return json&&json.data!==undefined?json.data:json;
}

function persistAuth(){localStorage.setItem(AUTHKEY,JSON.stringify({token:AUTH.token,businessId:AUTH.businessId,user:AUTH.user}))}
function clearAuth(){AUTH={token:null,businessId:null,user:null};localStorage.removeItem(AUTHKEY)}
function restoreAuth(){try{const a=JSON.parse(localStorage.getItem(AUTHKEY)||'null');if(a&&a.token)AUTH=a}catch(e){}}

function defaults(){return{
 settings:{gymName:'FITO6 FITNESS STUDIO',branch:'Main Branch',branches:['Main Branch'],gstNo:'',gstPct:18,
  packages:[{name:'1 Month',months:1,price:1500},{name:'3 Month',months:3,price:4000},{name:'6 Month',months:6,price:7000},{name:'12 Month',months:12,price:12000},{name:'Couple 12 Month',months:12,price:20000},{name:'Student 3 Month',months:3,price:3200},{name:'Corporate 12 Month',months:12,price:10000}],
  ptPackages:[{name:'PT 1 Month',months:1,price:5000},{name:'PT 3 Month',months:3,price:13500},{name:'PT 12 Sessions',months:1,price:4000}],
  dancePackages:[{name:'Dance 1 Month',months:1,price:1200},{name:'Dance 3 Month',months:3,price:3000},{name:'Boxing 1 Month',months:1,price:2500}],
  groupClassPackages:null,
  subTypes:['New Membership','Renew Membership','Upgrade Membership','New PT','Renew PT','Group Class','Freeze Membership','Transfer Membership'],
  expCats:['Rent','Electricity','Salary','Petrol','Marketing','Maintenance','Repairs','Office Expense','Cleaning','Stationery','Equipment Purchase','Water','Internet','Tea','Misc'],
  incCats:['Product Sales','Owner Investment','Misc Income','Interest','Other Income'],
  payModes:['Cash','UPI','Card','Cheque','Bank Transfer'],openingCash:0},
 users:[],
 seq:{client:1000,invoice:1,receipt:1,voucher:1,staff:100,trainer:0,payroll:0,clientByYear:{}},
 clients:[],subs:[],invoices:[],cashbook:[],staff:[],staffAtt:[],memberAtt:[],payroll:[],audit:[],leads:[],batches:[],classes:[],todos:[],meterReadings:[]};}

function cacheLocal(){try{localStorage.setItem(DBKEY,JSON.stringify(db))}catch(e){}}
function loadLocalCache(){try{return JSON.parse(localStorage.getItem(DBKEY))}catch(e){return null}}

async function loadFromCloud(){
 const res=await api('/erp-store');
 if(res&&res.data){db=res.data;ensurePkgSettings();cacheLocal();_cloudReady=true;return 'firestore'}
 const local=loadLocalCache();
 if(local&&((local.clients&&local.clients.length)||(local.invoices&&local.invoices.length))){
  db=local;ensurePkgSettings();
  await api('/erp-store',{method:'PUT',body:{data:db}});
  _cloudReady=true;return 'migrated';
 }
 db=defaults();ensurePkgSettings();
 await api('/erp-store',{method:'PUT',body:{data:db}});
 cacheLocal();_cloudReady=true;return 'new';
}

function save(){
 ensurePkgSettings();
 cacheLocal();
 if(!_cloudReady||!AUTH.token||!AUTH.businessId)return;
 clearTimeout(_saveTimer);
 _saveTimer=setTimeout(()=>{persistCloud()},500);
}
async function persistCloud(){
 if(!AUTH.token||!AUTH.businessId||!db)return;
 try{
  await api('/erp-store',{method:'PUT',body:{data:db}});
 }catch(e){
  console.error('Cloud save failed',e);
  toast('Cloud save failed — check connection. Data kept in this browser until retry.');
 }
}

function ensurePkgSettings(){
 if(!db.settings)db.settings=defaults().settings;
 const d=defaults().settings;
 if(!Array.isArray(db.settings.packages))db.settings.packages=d.packages;
 if(!Array.isArray(db.settings.ptPackages))db.settings.ptPackages=d.ptPackages;
 if(!Array.isArray(db.settings.dancePackages))db.settings.dancePackages=d.dancePackages;
 // Group Class replaces Dance; keep dancePackages as alias storage
 if(!Array.isArray(db.settings.groupClassPackages)){
  db.settings.groupClassPackages=db.settings.dancePackages||d.dancePackages;
 }
 db.settings.dancePackages=db.settings.groupClassPackages;
 if(!Array.isArray(db.settings.subTypes)||!db.settings.subTypes.length)db.settings.subTypes=d.subTypes;
 if(!Array.isArray(db.settings.payModes))db.settings.payModes=d.payModes;
 if(!Array.isArray(db.settings.incCats))db.settings.incCats=d.incCats;
 if(!Array.isArray(db.settings.expCats))db.settings.expCats=d.expCats;
 ['packages','ptPackages','dancePackages','groupClassPackages'].forEach(k=>{
  if(!Array.isArray(db.settings[k]))return;
  db.settings[k]=db.settings[k].map(p=>({name:p.name,months:Number(p.months)||1,price:Number(p.price)||0,active:p.active!==false}));
 });
 if(!db.seq)db.seq=defaults().seq;
 if(!db.seq.clientByYear)db.seq.clientByYear={};
 if(db.seq.trainer==null)db.seq.trainer=0;
 if(db.seq.payroll==null)db.seq.payroll=0;
 if(!Array.isArray(db.batches))db.batches=[];
 if(!Array.isArray(db.classes))db.classes=[];
 if(!Array.isArray(db.todos))db.todos=[];
 if(!Array.isArray(db.meterReadings))db.meterReadings=[];
 (db.clients||[]).forEach(c=>{if(!c.status)c.status='Active'});
 (db.cashbook||[]).forEach(e=>{if(!e.status)e.status='Active'});
}

/* ================= HELPERS ================= */
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const inr=n=>'₹'+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const thisMonth=()=>today().slice(0,7);
const fmtD=d=>d?new Date(d+'T00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'-';
function addMonths(dateStr,m){const d=new Date(dateStr+'T00:00');d.setMonth(d.getMonth()+m);return d.toISOString().slice(0,10)}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2600)}
function val(id){return $(id)?$(id).value.trim():''}
function num(id){return parseFloat(val(id))||0}
function openModal(html){$('modal').innerHTML=html;$('modalwrap').style.display='flex';$('modal').querySelectorAll('script').forEach(s=>{try{eval(s.textContent)}catch(e){console.error(e)}})}
function closeModal(){$('modalwrap').style.display='none'}
function audit(action,detail,oldV,newV){db.audit.unshift({ts:new Date().toISOString(),user:USER?USER.name:'-',role:USER?USER.role:'-',action,detail:detail||'',oldV:oldV||'',newV:newV||''});if(db.audit.length>3000)db.audit.length=3000;save()}
function csvExport(rows,name){const csv=rows.map(r=>r.map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name+'.csv';a.click();toast('Exported '+name+'.csv')}
function printHTML(html){$('printarea').innerHTML=html;window.print()}
function client(id){return db.clients.find(c=>c.id===id)}
function staffById(id){return db.staff.find(s=>s.id===id)}
function nextNo(key,prefix){if(!db.seq[key])db.seq[key]=0;const n=++db.seq[key];save();return prefix+String(n).padStart(4,'0')}
function nextClientId(){
 const yy=String(new Date().getFullYear()).slice(2);
 if(!db.seq.clientByYear)db.seq.clientByYear={};
 if(!db.seq.clientByYear[yy])db.seq.clientByYear[yy]=0;
 db.seq.clientByYear[yy]++;
 save();
 return yy+'FIT'+String(db.seq.clientByYear[yy]).padStart(3,'0');
}
function nextStaffId(dept){
 const isTr=/train/i.test(dept||'');
 const key=isTr?'trainer':'staff';
 if(db.seq[key]==null)db.seq[key]=isTr?0:100;
 const n=++db.seq[key];save();
 return(isTr?'TR':'ST')+String(n).padStart(4,'0');
}
function nextPayrollId(){if(!db.seq.payroll)db.seq.payroll=0;const n=++db.seq.payroll;save();return'PR'+String(n).padStart(6,'0')}
function caps(s){return String(s||'').toUpperCase()}
function bindCaps(ids){ids.forEach(id=>{const el=$(id);if(!el||el.readOnly||el.disabled)return;el.classList.add('caps');el.addEventListener('input',()=>{const s=el.selectionStart,e=el.selectionEnd;el.value=el.value.toUpperCase();try{el.setSelectionRange(s,e)}catch(err){}})})}
function readPhoto(inputId,previewId,cb){
 const inp=$(inputId);if(!inp||!inp.files||!inp.files[0]){cb('');return}
 const f=inp.files[0];if(f.size>2.5e6){toast('Photo max 2.5MB');cb('');return}
 const r=new FileReader();r.onload=()=>{
  const img=new Image();img.onload=()=>{
   const max=400,scale=Math.min(1,max/Math.max(img.width,img.height));
   const c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
   c.getContext('2d').drawImage(img,0,0,c.width,c.height);
   const data=c.toDataURL('image/jpeg',0.72);
   if(previewId&&$(previewId)){$(previewId).src=data;$(previewId).style.display='block'}
   cb(data);
  };img.src=r.result;
 };r.readAsDataURL(f);
}
function toggleTbDrop(id){const el=$(id);const open=el&&el.style.display==='block';closeTbDrops();if(el&&!open)el.style.display='block'}
function closeTbDrops(){['tb_bill_drop','tb_cash_drop'].forEach(id=>{const el=$(id);if(el)el.style.display='none'})}
function refreshTopbarNotifs(){
 const due=db.invoices.filter(i=>i.pending>0).slice(0,12);

function filterCashMode(mode){go('cashbook');setTimeout(()=>{if($('cb_mode')){$('cb_mode').value=mode;applyCbFilters()}},50)}
function lineChart(data,color){
 const max=Math.max(...data.map(d=>d.y),1),w=320,h=140,pad=18;
 const pts=data.map((d,i)=>{const x=pad+(i*(w-2*pad)/Math.max(data.length-1,1));const y=h-pad-((d.y/max)*(h-2*pad));return x+','+y}).join(' ');
 return`<svg class="linechart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline fill="none" stroke="${color||'var(--brand)'}" stroke-width="2.5" points="${pts}"/>${data.map((d,i)=>{const x=pad+(i*(w-2*pad)/Math.max(data.length-1,1));const y=h-pad-((d.y/max)*(h-2*pad));return`<circle cx="${x}" cy="${y}" r="3" fill="${color||'#ff6a00'}"/>`}).join('')}</svg><div class="row" style="justify-content:space-between;font-size:10px;color:var(--mut)">${data.map(d=>`<span>${d.x}</span>`).join('')}</div>`;
}

let USER=null,PAGE='dashboard';
const MENUS={
 superadmin:['dashboard','clients','memberships','billing','cashbook','expenses','meter','staff','attendance','payroll','batches','reports','accounts','audit','settings'],
 frontoffice:['dashboard','clients','memberships','billing','cashbook','attendance','batches'],

function mapCloudRole(role,email,name){
 if(role==='ADMIN')return'superadmin';
 const tip=((email||'')+' '+(name||'')+' '+(USER&&USER.jobType||'')).toLowerCase();
 if(/train/.test(tip)||(AUTH.user&&/train/i.test(AUTH.user.jobType||'')))return'trainer';
 if(/account/.test(tip))return'accountant';
 return'frontoffice';
}
function showLoginError(msg){const el=$('lg_err');if(!el)return;el.style.display=msg?'block':'none';el.textContent=msg||''}
async function doLogin(){
 showLoginError('');
 const email=val('lg_u').toLowerCase(),password=val('lg_p');
 if(!email||!password){showLoginError('Enter email and password');return}
 const btn=$('lg_btn');if(btn){btn.disabled=true;btn.textContent='Signing in…'}
 try{
  await initApiConfig();
  const result=await api('/auth/login',{method:'POST',body:{email,password}});
  AUTH.token=result.token;
  AUTH.user=result.user;
  const businesses=await api('/businesses');
  if(!businesses||!businesses.length)throw new Error('No business found for this account');
  AUTH.businessId=businesses[0].id;
  persistAuth();
  const source=await loadFromCloud();
  USER={u:AUTH.user.email,p:'',role:mapCloudRole(AUTH.user.role,AUTH.user.email,AUTH.user.name),name:AUTH.user.name,cloudRole:AUTH.user.role,jobType:AUTH.user.jobType};
  $('login').style.display='none';$('app').style.display='block';
  $('tb_user').textContent=USER.name+' · '+USER.role+(source==='firestore'?' · cloud':' · synced');
  $('sb_role').textContent=(db.settings&&db.settings.gymName)||businesses[0].name||'FITO6';
  audit('Login','Cloud login · '+email);
  buildNav();go('dashboard');refreshTopbarNotifs();
  toast(source==='migrated'?'Local data uploaded to cloud database':source==='new'?'Cloud database ready':'Loaded from cloud database');
 }catch(e){
  showLoginError(e.message||'Login failed');
  toast(e.message||'Login failed');
 }finally{
  if(btn){btn.disabled=false;btn.textContent='Login'}
 }
}
function logout(){
 try{if(db&&USER)audit('Logout','User logged out')}catch(e){}
 USER=null;_cloudReady=false;clearAuth();
 $('app').style.display='none';$('login').style.display='flex';
}
function buildNav(){$('nav').innerHTML=MENUS[USER.role].map(p=>`<a href="#" id="nav_${p}" onclick="go('${p}');return false"><i>${PAGES[p][0]}</i><span>${PAGES[p][1]}</span></a>`).join('')}
function go(p,arg){if(!MENUS[USER.role].includes(p)){toast('No permission');return} PAGE=p;
 document.querySelectorAll('#sidebar a').forEach(a=>a.classList.remove('on'));const n=$('nav_'+p);if(n)n.classList.add('on');
 closeTbDrops();

 refreshTopbarNotifs()}

/* ================= COMPUTED HELPERS ================= */
function payListFor(dateFrom,dateTo){const out=[];db.invoices.forEach(iv=>(iv.payments||[]).forEach(p=>{if(p.date>=dateFrom&&p.date<=dateTo)out.push({...p,inv:iv})}));return out}
function cashIn(d1,d2,mode){return db.cashbook.filter(e=>e.status!=='Inactive'&&e.type==='in'&&e.date>=d1&&e.date<=d2&&(!mode||e.mode===mode)).reduce((s,e)=>s+e.amount,0)}
function cashOut(d1,d2,mode){return db.cashbook.filter(e=>e.status!=='Inactive'&&e.type==='out'&&e.date>=d1&&e.date<=d2&&(!mode||e.mode===mode)).reduce((s,e)=>s+e.amount,0)}
function subStatus(s){if(s.status==='Used')return'Used';if(s.status==='Frozen')return'Frozen';if(s.status==='Expired')return'Expired';return s.end>=today()?'Active':'Expired'}
function activeSubs(type){return db.subs.filter(s=>s.type===type&&subStatus(s)==='Active')}
function expiredSubs(type){return db.subs.filter(s=>s.type===type&&subStatus(s)==='Expired')}
function barChart(data,cls){
 const max=Math.max(...data.map(d=>d.y),1);
 return `<div class="bars">${data.map(d=>`<div class="b"><span class="y">${d.y?(d.y>=1000?(d.y/1000).toFixed(1)+'k':d.y):''}</span><div class="bar ${cls||''}" style="height:${Math.round(d.y/max*100)}%"></div><span class="x">${d.x}</span></div>`).join('')}</div>`}

function staffBillRepList(){
 const list=(db.staff||[]).filter(s=>s.status!=='Inactive'&&(s.billRep!==false));
 // Prefer staff flagged as bill reps when any exist

 if(use.length)return use;

}
function billRepSelect(id,selectedName,selectedId){
 const staff=staffBillRepList();
 const opts=['<option value="">— Select staff —</option>']
  .concat(staff.map(s=>{
   const label=s.dept?`${s.name} (${s.dept})`:s.name;
   const sel=(selectedId&&s.id===selectedId)||(!selectedId&&selectedName&&s.name===selectedName)?'selected':'';
   return`<option value="${esc(s.id)}" data-name="${esc(s.name)}" ${sel}>${esc(label)}</option>`;
  }));
 return`<div class="field"><label>Bill Rep (Staff handling / collecting)</label><select id="${id}">${opts.join('')}</select></div>`;
}
function readBillRep(selectId){
 const el=$(selectId);if(!el||!el.value)return{billRepId:'',billRep:''};
 const opt=el.selectedOptions[0];
 return{billRepId:el.value,billRep:(opt&&opt.dataset.name)||opt.textContent.split(' (')[0]};
}

function previewWizPhoto(){readPhoto('w_photo','w_photo_prev',data=>{WIZ._photo=data})}
function wizPrev(){
 if(WIZ.step===1){closeModal();return}
 if(WIZ.step===2){WIZ.step=1;WIZ.c=client(WIZ.clientId)||WIZ.c;renderWizard();return}
 if(WIZ.step===3){WIZ.step=2;renderWizard()}

function collectWizPersonal(){
 return{
  name:caps(val('w_name')),gender:val('w_gender'),dob:val('w_dob'),mobile:val('w_mobile'),wa:val('w_wa')||val('w_mobile'),
  email:val('w_email'),anniversary:val('w_anniv'),addr:caps(val('w_addr')),city:caps(val('w_city')),state:caps(val('w_state')),

function wizSave1(goNext){
 const data=collectWizPersonal();
 if(!data.name||!data.mobile){toast('Name and Mobile are required');return}
 if(!data.gender){toast('Gender is mandatory');return}
 if(!data.dob){toast('Date of birth is mandatory');return}
 const br=readBillRep('w_billrep');
 if(!br.billRep){toast('Select Bill Rep (staff handling this client)');return}
 const finish=(photo)=>{
  if(WIZ.clientId){
   const c=client(WIZ.clientId);if(!c){toast('Client missing');return}
   // name/mobile locked — do not overwrite
   Object.assign(c,{...data,name:c.name,mobile:c.mobile,billRepId:br.billRepId,billRep:br.billRep});
   if(photo)c.photo=photo;
   const h=parseFloat(c.ht),w=parseFloat(c.wt);if(h&&w)c.bmi=(w/((h/100)**2)).toFixed(1);
   WIZ.c=c;save();audit('Member Updated',c.id+' '+c.name);
   toast('Client '+c.id+' saved');
   if(goNext){WIZ.step=2;renderWizard()}
   return;
  }
  const id=nextClientId();
  const c={id,...data,photo:photo||'',billRepId:br.billRepId,billRep:br.billRep,joined:today(),branch:db.settings.branch,notes:[],status:'Active'};
  const h=parseFloat(c.ht),w=parseFloat(c.wt);if(h&&w)c.bmi=(w/((h/100)**2)).toFixed(1);
  db.clients.push(c);save();audit('Member Added',c.id+' '+c.name+' · Bill Rep: '+c.billRep);
  WIZ.clientId=id;WIZ.c=c;
  toast('Client '+id+' saved');
  if(goNext){WIZ.step=2;renderWizard()}
  else renderWizard();
 };
 if($('w_photo')&&$('w_photo').files&&$('w_photo').files[0])readPhoto('w_photo','w_photo_prev',finish);
 else finish(WIZ._photo||(WIZ.c&&WIZ.c.photo)||'');
}
/* ---- Membership packages (customizable) ---- */
const PKG_KEYS={membership:'packages',pt:'ptPackages',group:'groupClassPackages',dance:'groupClassPackages'};
const PKG_LABELS={membership:'Membership',pt:'Personal Training',group:'Group Class',dance:'Group Class'};
let PKG_TAB='membership';
function pkgStore(kind){ensurePkgSettings();const k=kind==='dance'?'group':kind;return db.settings[PKG_KEYS[k]||'packages']}
function pkgListFor(t){
 ensurePkgSettings();
 if(/PT/i.test(t))return db.settings.ptPackages.filter(p=>p.active!==false);
 if(isGroupClassType(t))return(db.settings.groupClassPackages||db.settings.dancePackages||[]).filter(p=>p.active!==false);
 return db.settings.packages.filter(p=>p.active!==false);
}

   <div class="sub">Group Class covers Dance, Boxing and other class packages</div></div>

  <button class="${kind==='pt'?'on':''}" onclick="PKG_TAB='pt';pgMemberships()">Personal Training</button>

  ${stat('Active packages',list.filter(p=>p.active!==false).length,'ok')}

function openPkgForm(kind,idx){
 const edit=idx!==undefined&&idx!==null;
 const list=pkgStore(kind);
 const p=edit?list[idx]:{name:'',months:1,price:0,active:true};
 openModal(`<h2>${edit?'Edit':'Add'} ${PKG_LABELS[kind]} Package</h2>
  <div class="grid g2" style="margin-top:12px">
   ${fld('pkg_name','Package Name',p.name)}
   ${fld('pkg_months','Duration (months)',p.months,'number')}
   ${fld('pkg_price','Amount ₹',p.price,'number')}
   <div class="field"><label>Status</label>
    <select id="pkg_active"><option value="1" ${p.active!==false?'selected':''}>Active (show when adding client)</option>
    <option value="0" ${p.active===false?'selected':''}>Hidden</option></select></div>
  </div>
  <p class="sub" style="margin:8px 0 14px">GST is not set here — it is entered and calculated in the client subscription step.</p>
  <div class="row" style="justify-content:flex-end;gap:8px">
   <button class="btn sec" onclick="closeModal()">Cancel</button>
   <button class="btn" onclick="savePkg('${kind}',${edit?idx:'null'})">Save Package</button>
  </div>`);
}
function savePkg(kind,idx){
 const name=val('pkg_name');const months=Math.max(1,parseInt(val('pkg_months'),10)||1);const price=Math.max(0,num('pkg_price'));
 if(!name){toast('Enter package name');return}
 if(price<=0){toast('Enter package amount');return}
 const row={name,months,price,active:val('pkg_active')!=='0'};
 const list=pkgStore(kind);
 if(idx===null||idx===undefined||idx==='null'){list.push(row);audit('Package Added',PKG_LABELS[kind]+' · '+name+' · '+inr(price))}
 else{const old=list[idx].name;list[idx]=row;audit('Package Updated',PKG_LABELS[kind]+' · '+old+' → '+name)}
 save();closeModal();toast('Package saved');pgMemberships();
}
function togglePkg(kind,idx){
 const list=pkgStore(kind);if(!list[idx])return;
 list[idx].active=list[idx].active===false;save();
 audit('Package Changed',list[idx].name+' · '+(list[idx].active!==false?'shown':'hidden'));
 pgMemberships();
}
function deletePkg(kind,idx){
 const list=pkgStore(kind);const p=list[idx];if(!p)return;
 if(!confirm('Delete package "'+p.name+'"? Existing client subscriptions keep their saved package name.'))return;
 list.splice(idx,1);save();audit('Package Deleted',PKG_LABELS[kind]+' · '+p.name);toast('Deleted');pgMemberships();
}

function openSubForm(clientId,type){openModal(`<h2>Subscription — ${esc(client(clientId).name)}</h2>`+subFormHTML(clientId,type||'New Membership',false))}
function trainerStaffList(){
 let list=(db.staff||[]).filter(s=>s.status!=='Inactive'&&(s.dept==='Trainer'||/train/i.test(s.dept||'')));

function isPtType(t){return /PT/i.test(t||'')}

function subFormHTML(clientId,type,wizard){
 const c=client(clientId)||{};
 ensurePkgSettings();
 const types=db.settings.subTypes||['New Membership','Renew Membership','Upgrade Membership','New PT','Renew PT','Group Class','Freeze Membership','Transfer Membership'];
 const used=db.subs.filter(s=>s.clientId===clientId).map(s=>`<span class="badge ${subStatus(s)==='Used'?'b-mut':subStatus(s)==='Active'?'b-ok':'b-bad'}">${esc(s.type)} · ${esc(s.pkg)} · ${subStatus(s)}</span>`).join(' ');
 return`
 ${used?`<div class="sub" style="margin-bottom:10px"><b>Previous subscriptions:</b> ${used}</div>`:''}
 <div class="grid g3">
  ${sel('s_type','Subscription Type',types,type||types[0])}
  <div class="field"><label>Package</label><select id="s_pkg" onchange="calcSub()"></select></div>
  ${fld('s_price','Package Price','','number')}
  ${fld('s_sell','Selling Price ₹','','number')}${fld('s_gst','GST %',db.settings.gstPct,'number')}${fld('s_start','Start Date',today(),'date')}
  <div class="field"><label>Branch</label><input id="s_branch" value="${esc(db.settings.branch)}"></div>
  ${billRepSelect('s_billrep',c.billRep,c.billRepId)}
  ${trainerSelectHTML(c)}
 </div>
 <div class="card" style="background:#fafbfd" id="s_calc"></div>
 <div class="row" style="justify-content:space-between;margin-top:12px">
  ${wizard?`<button class="btn sec" onclick="wizPrev()">← Previous</button>`:`<button class="btn sec" onclick="closeModal()">Cancel</button>`}
  <button class="btn" onclick="saveSub('${clientId}',${wizard})">${wizard?'Save & Next ➜':'Save Subscription ➜ Billing'}</button>
 </div>
 <script>fillPkgs();syncTrainerField();calcSub()<\/script>`}
function fillPkgs(){const t=val('s_type');const list=pkgListFor(t);$('s_pkg').innerHTML=list.map(p=>`<option data-p="${p.price}" data-m="${p.months}">${esc(p.name)} — ${inr(p.price)}</option>`).join('')+'<option data-p="0" data-m="1">Custom</option>';
 $('s_type').onchange=()=>{fillPkgs();syncTrainerField();calcSub()};$('s_price').oninput=()=>{if($('s_sell')&&!num('s_sell'))$('s_sell').value=$('s_price').value;calcSub()};$('s_sell').oninput=calcSub;$('s_gst').oninput=calcSub;$('s_start').onchange=calcSub;
 const o=$('s_pkg').selectedOptions[0];$('s_price').value=o?o.dataset.p:0;if($('s_sell'))$('s_sell').value=$('s_price').value;calcSub()}
function calcSub(){const o=$('s_pkg').selectedOptions[0];if(!o)return;
 if($('s_pkg')._last!==o.text){$('s_price').value=o.dataset.p;if($('s_sell'))$('s_sell').value=o.dataset.p;$('s_pkg')._last=o.text}
 const months=parseInt(o.dataset.m)||1,price=num('s_price'),gstp=num('s_gst');
 // Selling price = what customer pays (before GST). Package price is MRP/list.
 let sell=num('s_sell');if(!sell||sell<=0)sell=price;if($('s_sell')&&!val('s_sell'))$('s_sell').value=String(sell);
 const disc=+(Math.max(0,price-sell)).toFixed(2);
 const woGst=+(Math.max(0,sell)).toFixed(2),gstAmt=+(woGst*gstp/100).toFixed(2),final=+(woGst+gstAmt).toFixed(2);
 const start=val('s_start')||today(),end=addDays(addMonths(start,months),-1);
 $('s_calc').innerHTML=`<div class="grid g6">${stat('Package Price',inr(price))}${stat('Selling Price',inr(woGst),'br')}${stat('GST Amount',inr(gstAmt))}${stat('Final Amount','<b>'+inr(final)+'</b>','br')}${stat('End Date',fmtD(end))}${stat('Validity',daysBetween(start,end)+1+' days')}</div>`;
 window._subCalc={months,price,sell:woGst,disc,gstp,gstAmt,woGst,final,start,end}}
function saveSub(clientId,wizard){
 const x=window._subCalc;if(!x||x.final<=0){toast('Enter a valid selling price');return}
 const type=val('s_type');
 if(type==='Freeze Membership'){const ms=db.subs.filter(s=>s.clientId===clientId&&s.type==='Membership').pop();if(ms){ms.status=ms.status==='Frozen'?'':'Frozen';save();audit('Package Changed','Freeze toggled for '+clientId);toast('Membership freeze updated');closeModal();go('clients')}return}
 const kind=type.startsWith('Renew')?'Renew':type.startsWith('Upgrade')?'Upgrade':'New';
 const t=type.includes('PT')?'PT':isGroupClassType(type)?'Group Class':'Membership';
 const br=readBillRep('s_billrep');
 if(!br.billRep){toast('Select Bill Rep (staff handling this client)');return}
 const tr=readTrainer();
 if(isPtType(type)&&!tr.trainer){toast('Select trainer staff for PT / Renew PT');return}
 // Mark prior same-type active subs as Used
 db.subs.filter(s=>s.clientId===clientId&&s.type===t&&s.status!=='Used'&&s.status!=='Frozen').forEach(s=>{if(subStatus(s)==='Active'||s.status==='')s.status='Used'});
 const sub={id:'S'+Date.now(),clientId,type:t,kind,pkg:val('s_pkg')?$('s_pkg').selectedOptions[0].text.split(' — ')[0]:'Custom',price:x.price,sell:x.sell,disc:x.disc,gstPct:x.gstp,gstAmt:x.gstAmt,woGst:x.woGst,final:x.final,start:x.start,end:x.end,trainer:tr.trainer,trainerId:tr.trainerId,branch:val('s_branch'),billRepId:br.billRepId,billRep:br.billRep,status:'',created:today()};
 db.subs.push(sub);
 const c=client(clientId);
 if(tr.trainer){c.trainer=tr.trainer;c.trainerId=tr.trainerId}
 c.billRepId=br.billRepId;c.billRep=br.billRep;
 // auto-generate invoice
 const inv={id:'I'+Date.now(),no:nextNo('invoice','INV-'),date:today(),clientId,subId:sub.id,desc:t+' · '+sub.pkg+' ('+fmtD(sub.start)+' → '+fmtD(sub.end)+')',woGst:x.woGst,gstPct:x.gstp,gst:x.gstAmt,grand:x.final,paid:0,pending:x.final,dueDate:today(),payments:[],by:br.billRep,billRep:br.billRep,billRepId:br.billRepId,trainer:tr.trainer,trainerId:tr.trainerId,branch:val('s_branch')||db.settings.branch};
 db.invoices.push(inv);save();
 audit('Subscription Created',c.name+' · '+type+' · '+sub.pkg+' · '+inr(x.final));
 toast('Invoice '+inv.no+' generated');
 if(wizard){WIZ.invId=inv.id;WIZ.step=3;renderWizard()}else{openModal(`<h2>Billing — ${esc(c.name)}</h2>`+payFormHTML(inv.id,false))}}

function payFormHTML(invId,wizard){
 const iv=db.invoices.find(i=>i.id===invId);const c=client(iv.clientId);
 return`
 <div class="card" style="background:#fafbfd;margin-bottom:12px">
 <div class="grid g4">${stat('Invoice',iv.no)}${stat('Customer',esc(c.name))}${stat('Total',inr(iv.grand))}${stat('Pending','<b>'+inr(iv.pending)+'</b>','bad')}</div></div>
 <h3>Payment (split allowed)</h3>
 <div id="payrows"></div>
 <button class="btn sec sm" onclick="addPayRow()">＋ Add payment mode</button>
 <div class="grid g2" style="margin-top:12px">${fld('p_due','Due Date (for balance)',today(),'date')}${fld('p_by','Collected By',USER?USER.name:'')}</div>
 <div class="row" style="justify-content:flex-end;margin-top:10px">
  <button class="btn sec" onclick="closeModal();${wizard?'':''}go('billing')">Skip / Pay Later</button>
  <button class="btn" onclick="savePayment('${invId}')">💾 Save Payment</button></div>
 <script>addPayRow(${iv.pending})<\/script>`}
let PAYROWN=0;
function addPayRow(amt){PAYROWN++;const d=document.createElement('div');d.className='row';d.style.marginBottom='8px';d.innerHTML=`
 <select id="pm_${PAYROWN}" style="width:160px">${db.settings.payModes.map(m=>`<option>${m}</option>`).join('')}</select>
 <input id="pa_${PAYROWN}" type="number" placeholder="Amount" style="width:160px" value="${amt||''}">
 <button class="btn sm dgr" onclick="this.parentNode.remove()">✕</button>`;$('payrows').appendChild(d)}
function savePayment(invId){
 const iv=db.invoices.find(i=>i.id===invId);const c=client(iv.clientId);
 const rows=[...document.querySelectorAll('#payrows .row')];const pays=[];
 rows.forEach(r=>{const mode=r.querySelector('select').value,amt=parseFloat(r.querySelector('input').value)||0;if(amt>0)pays.push({mode,amt})});
 if(!pays.length){toast('Enter at least one payment amount');return}
 const totalPay=pays.reduce((s,p)=>s+p.amt,0);
 if(totalPay>iv.pending+0.01){toast('Payment exceeds pending amount');return}
 const by=val('p_by')||USER.name;
 pays.forEach(p=>{
  const rc=nextNo('receipt','RCP-');
  iv.payments.push({date:today(),mode:p.mode,amt:p.amt,receipt:rc,by});
  // AUTOMATION → Cashbook entry
  const mType=(iv.desc||'').match(/\b(PT|Dance|Group Class|Membership)\b/i);
  let salesType='Membership';
  if(mType){const k=mType[1].toLowerCase();salesType=k==='pt'?'PT':(k.includes('group')||k==='dance')?'Group Class':'Membership'}
  db.cashbook.push({id:'CB'+Date.now()+Math.random().toString(36).slice(2,6),date:today(),type:'in',no:rc,particulars:iv.desc,category:iv.desc.split(' ·')[0]+' Payment',party:c.name,mode:p.mode,amount:p.amt,by,notes:'Invoice '+iv.no,salesType,roleCat:USER&&USER.role==='superadmin'?'Master Admin':(USER&&USER.role==='trainer'?'Trainer':(USER&&USER.role==='accountant'?'Admin':'Staff')),status:'Active'});
 });
 iv.paid+=totalPay;iv.pending=+(iv.grand-iv.paid).toFixed(2);iv.dueDate=val('p_due');
 save();audit('Payment Received',c.name+' · '+iv.no+' · '+inr(totalPay));
 toast('Payment saved — cashbook, ledger & dashboard updated');
 closeModal();showInvoice(iv.id)}

let BILL_F={status:'',month:'',billRep:'',sales:''};
function pgBilling(){
 const reps=[...new Set(db.invoices.map(i=>i.billRep||i.by).filter(Boolean))];

function calcEditSub(){
 const price=num('es_price');let sell=num('es_sell');if(!sell||sell<=0)sell=price;
 const gstp=num('es_gst');
 const woGst=+(Math.max(0,sell)).toFixed(2),gstAmt=+(woGst*gstp/100).toFixed(2),final=+(woGst+gstAmt).toFixed(2);

 let end=val('es_end');
 if($('es_calc'))$('es_calc').innerHTML=`<div class="grid g4">${stat('Package',inr(price))}${stat('Selling',inr(woGst),'br')}${stat('GST',inr(gstAmt))}${stat('Final','<b>'+inr(final)+'</b>','br')}</div>`;
 window._editSubCalc={price,sell:woGst,disc:+(Math.max(0,price-woGst)).toFixed(2),gstp,gstAmt,woGst,final,start,end};
}
function saveEditSub(subId){
 calcEditSub();

 const x=window._editSubCalc;if(!x||x.final<=0){toast('Enter a valid selling price');return}
 const pkg=val('es_pkg');if(!pkg){toast('Package name required');return}
 const br=readBillRep('es_billrep');
 if(!br.billRep){toast('Select Bill Rep');return}
 let trainer=s.trainer||'',trainerId=s.trainerId||'';

  pkg,price:x.price,sell:x.sell,disc:x.disc,gstPct:x.gstp,gstAmt:x.gstAmt,woGst:x.woGst,final:x.final,
  start:val('es_start')||s.start,end:val('es_end')||s.end,branch:val('es_branch'),
  billRep:br.billRep,billRepId:br.billRepId,trainer,trainerId,

  inv.desc=`${s.type} · ${s.pkg} (${fmtD(s.start)} → ${fmtD(s.end)})`;
 }
 save();
 audit('Subscription Updated',(c?c.name:'')+' · '+s.pkg+' · '+inr(oldFinal)+' → '+inr(x.final));
 toast('Subscription updated');

}

function cbDetectSalesType(e){
 if(e.salesType)return e.salesType;
 const t=((e.category||'')+' '+(e.particulars||'')).toLowerCase();
 if(/\bpt\b|personal train/.test(t))return 'PT';
 if(/group class|dance|boxing|zumba|yoga/.test(t))return 'Group Class';
 if(/membership|renew|upgrade|freeze|transfer/.test(t))return 'Membership';
 if(/product/.test(t))return 'Product Sales';
 if(e.type==='out')return 'Expense';
 return 'Other Income';
}

}
function cbFilterState(){
 return{
  month:($('cb_month')&&val('cb_month'))||'',
  cat:($('cb_cat')&&val('cb_cat'))||'',
  party:($('cb_party')&&val('cb_party').trim().toLowerCase())||'',
  flow:($('cb_flow')&&val('cb_flow'))||'',
  mode:($('cb_mode')&&val('cb_mode'))||'',
  sales:($('cb_sales')&&val('cb_sales'))||'',
  role:($('cb_role')&&val('cb_role'))||'',
  show:($('cb_show')&&val('cb_show'))||'Active'
 };
}
function cbMatch(e,f){
 const show=f.show||'Active';
 if(show==='Active'&&e.status==='Inactive')return false;
 if(show==='Inactive'&&e.status!=='Inactive')return false;
 if(f.month&&!(e.date||'').startsWith(f.month))return false;
 if(f.cat&&e.category!==f.cat)return false;
 if(f.party&&!(e.party||'').toLowerCase().includes(f.party))return false;
 if(f.flow==='in'&&e.type!=='in')return false;
 if(f.flow==='out'&&e.type!=='out')return false;
 if(f.mode&&e.mode!==f.mode)return false;
 if(f.sales&&cbDetectSalesType(e)!==f.sales)return false;

/* ================= ELECTRICITY METER ================= */
let METER_MONTH='';
function meterFor(date){return(db.meterReadings||[]).find(r=>r.date===date)}
function meterDayFinal(night,day){
 const n=Number(night),d=Number(day);
 if(!Number.isFinite(n)||!Number.isFinite(d))return null;
 return +(d-n).toFixed(2);
}
function meterMonthTotal(ym){
 return(db.meterReadings||[]).filter(r=>(r.date||'').startsWith(ym)&&r.final!=null)
  .reduce((s,r)=>s+Number(r.final||0),0);
}
function pgMeter(){
 if(!Array.isArray(db.meterReadings))db.meterReadings=[];
 const ym=METER_MONTH||thisMonth();
 METER_MONTH=ym;
 const [y,mo]=ym.split('-').map(Number);
 const first=new Date(y,mo-1,1);
 const daysInMonth=new Date(y,mo,0).getDate();
 const startPad=first.getDay(); // 0 Sun
 const monthRows=(db.meterReadings||[]).filter(r=>(r.date||'').startsWith(ym)).sort((a,b)=>a.date.localeCompare(b.date));
 const monthFinal=meterMonthTotal(ym);
 const cells=[];
 for(let i=0;i<startPad;i++)cells.push(`<div class="day mut"></div>`);
 for(let d=1;d<=daysInMonth;d++){
  const date=ym+'-'+String(d).padStart(2,'0');
  const r=meterFor(date);
  const has=!!r&&(r.night!=null||r.day!=null);
  cells.push(`<div class="day ${has?'has':''}" onclick="meterEntry('${date}')">
   <div class="dn">${d}</div>
   ${has?`<div class="sm">N: ${r.night??'—'}<br>D: ${r.day??'—'}</div>
   <div class="fv">${r.final!=null?r.final+' u':'—'}</div>`:`<div class="sm">No entry</div>`}
  </div>`);
 }
 $('content').innerHTML=`
 <div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
  <div><h2>Electricity Meter</h2>
   <div class="sub">Enter <b>Night</b> and <b>Day</b> readings · Daily final = Day − Night · Month total sums daily finals</div></div>
  <div class="row" style="gap:8px;align-items:end">
   <div class="field" style="margin:0"><label>Month</label><input type="month" id="mt_month" value="${ym}" onchange="METER_MONTH=this.value;pgMeter()"></div>
   <button class="btn" onclick="meterEntry(today())">＋ Today’s Entry</button>
  </div>
 </div>
 <div class="grid g4" style="margin:14px 0">
  ${stat('Days entered',monthRows.length,'ok')}
  ${stat('Month final (units)',monthFinal.toFixed(2),'br')}
  ${stat('Avg / day',monthRows.length?(monthFinal/monthRows.length).toFixed(2):'0')}
  ${stat('Formula','Day − Night')}
 </div>
 <div class="card">
  <div class="cal">
   ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(h=>`<div class="hd">${h}</div>`).join('')}
   ${cells.join('')}
  </div>
 </div>
 <h3 style="margin-top:16px">Day-wise log (${ym})</h3>
 <div class="tbl"><table><tr><th>Date</th><th class="r">Night</th><th class="r">Day</th><th class="r">Final (Day−Night)</th><th>By</th><th>Notes</th><th></th></tr>
  ${monthRows.slice().reverse().map(r=>`<tr>
   <td class="clickable" onclick="meterEntry('${r.date}')">${fmtD(r.date)}</td>
   <td class="r">${r.night??'—'}</td><td class="r">${r.day??'—'}</td>
   <td class="r bold">${r.final!=null?r.final:'—'}</td>
   <td>${esc(r.by||'')}</td><td>${esc(r.notes||'')}</td>
   <td class="r"><button class="btn sm sec" onclick="meterEntry('${r.date}')">Edit</button>
   <button class="btn sm dgr" onclick="deleteMeterEntry('${r.date}')">Delete</button></td>
  </tr>`).join('')||'<tr><td colspan=7 class="mut">No readings this month — click a calendar day</td></tr>'}
  <tr><td class="bold" colspan="3">Month total</td><td class="r bold" style="color:var(--brand)">${monthFinal.toFixed(2)}</td><td colspan="3"></td></tr>
 </table></div>`;
}
function meterEntry(date){
 const r=meterFor(date)||{date,night:'',day:'',notes:''};
 const preview=meterDayFinal(r.night,r.day);
 openModal(`<h2>Meter Reading — ${fmtD(date)}</h2>
 <p class="sub" style="margin-bottom:12px">Enter twice daily: <b>Night</b> reading and <b>Day</b> reading. Final for the day = <b>Day − Night</b>.</p>
 <div class="grid g3">
  ${fld('mt_night','Night reading',r.night??'','number')}
  ${fld('mt_day','Day reading',r.day??'','number')}
  <div class="field"><label>Daily final (auto)</label><input id="mt_final" readonly class="ro" value="${preview!=null?preview:''}"></div>
  ${fld('mt_notes','Notes',r.notes||'')}
  ${fld('mt_by','Entered By',r.by||(USER?USER.name:''))}
 </div>
 <div class="row" style="justify-content:flex-end;gap:8px;margin-top:12px">
  <button class="btn sec" onclick="closeModal()">Cancel</button>
  <button class="btn" onclick="saveMeterEntry('${date}')">Save Reading</button>
 </div>
 <script>
  function _mtRecalc(){const f=meterDayFinal(num('mt_night'),num('mt_day'));$('mt_final').value=f==null?'':f}
  ['mt_night','mt_day'].forEach(id=>{const el=$(id);if(el){el.oninput=_mtRecalc;el.onchange=_mtRecalc}})
 <\/script>`)}
function saveMeterEntry(date){
 const nightRaw=val('mt_night'),dayRaw=val('mt_day');
 if(nightRaw===''||dayRaw===''){toast('Enter both night and day readings');return}
 const night=parseFloat(nightRaw),day=parseFloat(dayRaw);
 if(!Number.isFinite(night)||!Number.isFinite(day)){toast('Invalid readings');return}
 const final=meterDayFinal(night,day);
 if(final==null){toast('Invalid readings');return}
 let r=meterFor(date);
 if(!r){r={date};db.meterReadings.push(r)}
 Object.assign(r,{night,day,final,notes:val('mt_notes'),by:val('mt_by')||USER.name,updated:today()});
 save();audit('Meter Reading',date+' · N '+night+' · D '+day+' · Final '+final);
 toast('Saved · Final '+final);closeModal();pgMeter();
}
function deleteMeterEntry(date){
 if(!confirm('Delete meter reading for '+fmtD(date)+'?'))return;
 db.meterReadings=(db.meterReadings||[]).filter(r=>r.date!==date);
 save();audit('Meter Reading Deleted',date);toast('Deleted');pgMeter();
}

function todoForm(){
 openModal(`<h2>Add Todo</h2><div class="grid g2">${fld('td_text','Task')}${fld('td_due','Due Date',today(),'date')}
 <div class="field"><label>Owner</label><select id="td_own">${(db.staff||[]).filter(s=>s.status==='Active').map(s=>`<option ${s.name===USER.name?'selected':''}>${esc(s.name)}</option>`).join('')||`<option>${esc(USER.name)}</option>`}</select></div>
 </div><div class="row" style="justify-content:flex-end;gap:8px"><button class="btn sec" onclick="closeModal()">Cancel</button>
 <button class="btn" onclick="saveTodo()">Save</button></div>`)}
function saveTodo(){
 const text=val('td_text');if(!text){toast('Enter task');return}
 db.todos.push({id:'TD'+Date.now(),text,due:val('td_due'),owner:val('td_own')||USER.name,ownerEmail:USER.u,done:false,created:today()});
 save();toast('Todo added');closeModal();go('todos');
}
function toggleTodo(id){const t=db.todos.find(x=>x.id===id);if(!t)return;t.done=!t.done;save();go('todos')}
function removeTodo(id){db.todos=db.todos.filter(t=>t.id!==id);save();go('todos')}

/* ================= SETTINGS ================= */
function pgSettings(){
 const s=db.settings;ensurePkgSettings();
 $('content').innerHTML=`<h2>Settings</h2>
 <div class="grid g2" style="margin-top:12px">
 <div class="card"><h3>Business</h3>
  ${fld('se_name','Gym Name',s.gymName)}${fld('se_branch','Branch',s.branch)}${fld('se_gstno','GST Number',s.gstNo)}${fld('se_gstp','Default GST %',s.gstPct,'number')}${fld('se_open','Opening Cash Balance ₹',s.openingCash,'number')}
  <button class="btn" onclick="saveSettings()">Save Settings</button></div>
 <div class="card"><h3>Membership / Subscriptions</h3>
  <p class="sub" style="margin-bottom:10px">Packages: Membership · PT · Group Class (Dance/Boxing/etc.)</p>
  <div class="sub" style="margin-bottom:10px">Membership: <b>${(s.packages||[]).length}</b> · PT: <b>${(s.ptPackages||[]).length}</b> · Group Class: <b>${(s.groupClassPackages||s.dancePackages||[]).length}</b></div>
  <button class="btn" onclick="go('memberships')">Open Memberships Module →</button></div>
 <div class="card"><h3>Subscription Types (editable)</h3>
  <textarea id="se_subtypes" rows="6">${(s.subTypes||[]).join('\n')}</textarea>
  <button class="btn" style="margin-top:10px" onclick="db.settings.subTypes=val('se_subtypes').split('\\n').map(x=>x.trim()).filter(Boolean);save();audit('Settings Changed','Subscription types');toast('Saved')">Save Types</button></div>
 <div class="card"><h3>Payment Modes (editable)</h3>
  <textarea id="se_pay" rows="5">${(s.payModes||[]).join('\n')}</textarea>
  <button class="btn" style="margin-top:10px" onclick="db.settings.payModes=val('se_pay').split('\\n').map(x=>x.trim()).filter(Boolean);save();audit('Settings Changed','Payment modes');toast('Saved')">Save Modes</button></div>
 <div class="card"><h3>Income Categories</h3><textarea id="se_inc" rows="6">${(s.incCats||[]).join('\n')}</textarea>
  <button class="btn" style="margin-top:10px" onclick="db.settings.incCats=val('se_inc').split('\\n').filter(Boolean);save();toast('Saved')">Save</button></div>
 <div class="card"><h3>Expense Categories</h3><textarea id="se_exp" rows="6">${(s.expCats||[]).join('\n')}</textarea>
  <button class="btn" style="margin-top:10px" onclick="db.settings.expCats=val('se_exp').split('\\n').filter(Boolean);save();audit('Settings Changed','Expense categories');toast('Saved')">Save Categories</button></div>
 <div class="card"><h3>Bill Rep Management</h3>
  <p class="sub">Toggle which staff appear in Bill Rep dropdowns (also editable on each staff profile).</p>
  <div class="tbl"><table><tr><th>Staff</th><th>Dept</th><th>Bill Rep</th></tr>
  ${(db.staff||[]).filter(st=>st.status==='Active').map(st=>`<tr><td>${esc(st.name)}</td><td>${esc(st.dept)}</td>
  <td><button class="btn sm ${st.billRep===false?'sec':''}" onclick="toggleBillRepFlag('${st.id}')">${st.billRep===false?'Off':'On'}</button></td></tr>`).join('')||'<tr><td colspan=3 class="mut">Add staff first</td></tr>'}</table></div></div>
 <div class="card"><h3>Backup & Data</h3>
  <div class="row" style="margin-bottom:10px"><button class="btn sec" onclick="backup()">⬇ Download Backup (JSON)</button>
  <label class="btn sec" style="display:inline-block">⬆ Restore Backup<input type="file" style="display:none" onchange="restore(this)"></label></div>
  <div class="row"><button class="btn sec" onclick="seedDemo()">🧪 Load Demo Data</button>
  <button class="btn dgr" onclick="if(confirm('Erase ALL data? This cannot be undone.')){localStorage.removeItem(DBKEY);location.reload()}">🗑 Factory Reset</button></div>
  <p class="sub" style="margin-top:10px">Cloud Firestore is the source of truth after login.</p></div>
 </div>`}
function toggleBillRepFlag(id){const s=staffById(id);if(!s)return;s.billRep=s.billRep===false;s.isBillRep=s.billRep;save();pgSettings()}
function saveSettings(){const s=db.settings;const old=s.gstPct;
 s.gymName=val('se_name');s.branch=val('se_branch');s.gstNo=val('se_gstno');s.gstPct=num('se_gstp');s.openingCash=num('se_open');
 save();audit('Settings Changed','Business settings',String(old),String(s.gstPct));toast('Settings saved');$('sb_role').textContent=s.gymName}
function parsePkgs(id){return val(id).split('\n').map(l=>l.split('|').map(x=>x.trim())).filter(a=>a[0]).map(a=>({name:a[0],months:parseInt(a[1])||1,price:parseFloat(a[2])||0}))}
function savePkgs(){db.settings.packages=parsePkgs('se_pkgs');db.settings.ptPackages=parsePkgs('se_pt');db.settings.dancePackages=parsePkgs('se_dance');save();audit('Settings Changed','Packages updated');toast('Packages saved')}
function backup(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db)],{type:'application/json'}));a.download='fito6-backup-'+today()+'.json';a.click();audit('Backup Downloaded','')}
function restore(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save();toast('Backup restored');location.reload()}catch(e){toast('Invalid backup file')}};r.readAsText(f)}

/* ================= GLOBAL SEARCH ================= */
function doSearch(){
 const q=val('gsearch').toLowerCase();if(!q)return;
 const cs=db.clients.filter(c=>[c.name,c.mobile,c.id,c.email].join(' ').toLowerCase().includes(q));
 const ivs=db.invoices.filter(i=>i.no.toLowerCase().includes(q));
 const sts=db.staff.filter(s=>[s.name,s.phone,s.id].join(' ').toLowerCase().includes(q));
 $('content').innerHTML=`<h2>Search: "${esc(q)}"</h2>
 <h3 style="margin-top:14px">Clients (${cs.length})</h3><div class="tbl"><table>${cs.map(c=>`<tr><td>${c.id}</td><td class="clickable" onclick="openClient('${c.id}')">${esc(c.name)}</td><td>${esc(c.mobile)}</td><td><button class="btn sm sec" onclick="openClient('${c.id}')">Open</button></td></tr>`).join('')||'<tr><td class="mut">None</td></tr>'}</table></div>
 <h3 style="margin-top:14px">Invoices (${ivs.length})</h3><div class="tbl"><table>${ivs.map(i=>`<tr><td class="clickable" onclick="showInvoice('${i.id}')">${i.no}</td><td>${fmtD(i.date)}</td><td class="r">${inr(i.grand)}</td></tr>`).join('')||'<tr><td class="mut">None</td></tr>'}</table></div>
 <h3 style="margin-top:14px">Staff (${sts.length})</h3><div class="tbl"><table>${sts.map(s=>`<tr><td>${s.id}</td><td>${esc(s.name)}</td><td>${esc(s.dept)}</td></tr>`).join('')||'<tr><td class="mut">None</td></tr>'}</table></div>`}

/* ================= DEMO DATA ================= */
function seedDemo(){
 if(!confirm('Load sample members, staff and transactions for testing?'))return;
 const names=[['Rahul Sharma','Male'],['Priya Patel','Female'],['Amit Kumar','Male'],['Sneha Reddy','Female'],['Vikram Singh','Male'],['Anjali Gupta','Female'],['Karthik Iyer','Male'],['Deepa Nair','Female']];
 db.staff.push({id:'ST'+nextNo('staff',''),name:'Suresh Trainer',dept:'Trainer',phone:'9800000001',salary:20000,shift:'Morning',status:'Active',joining:'2025-01-01'},
 {id:'ST'+nextNo('staff',''),name:'Meena Reception',dept:'Reception',phone:'9800000002',salary:15000,shift:'Evening',status:'Active',joining:'2025-03-01'});
 names.forEach((n,i)=>{
  const id=nextClientId();
  const created=addDays(today(),-(i*11)%60);
  db.clients.push({id,name:caps(n[0]),gender:n[1],mobile:'98'+String(10000000+i*137).slice(0,8),joined:created,ref:['Walk-in','Instagram','Google','Reference'][i%4],branch:db.settings.branch,goal:'General Fitness',notes:[],status:'Active',dob:addDays(today(),-9000-i*40)});
  const pkg=db.settings.packages[i%4];const gstp=db.settings.gstPct;
  const woGst=pkg.price,gstAmt=+(woGst*gstp/100).toFixed(2),final=+(woGst+gstAmt).toFixed(2);
  const start=created,end=addDays(addMonths(start,pkg.months),-1);
  const sub={id:'S'+Date.now()+i,clientId:id,type:i%3===2?'PT':'Membership',kind:i%4===3?'Renew':'New',pkg:pkg.name,price:pkg.price,disc:0,gstPct:gstp,gstAmt,woGst,final,start,end,trainer:'Suresh Trainer',branch:db.settings.branch,status:'',created};
  db.subs.push(sub);
  const inv={id:'I'+Date.now()+i,no:nextNo('invoice','INV-'),date:created,clientId:id,subId:sub.id,desc:sub.type+' · '+pkg.name,woGst,gstPct:gstp,gst:gstAmt,grand:final,paid:0,pending:final,dueDate:created,payments:[],by:['Super Admin','Front Office'][i%2],trainer:'Suresh Trainer'};
  const mode=['Cash','UPI','Card','Bank Transfer'][i%4];
  const payAmt=i%5===4?Math.round(final*0.6):final;
  inv.payments.push({date:created,mode,amt:payAmt,receipt:nextNo('receipt','RCP-'),by:inv.by});
  inv.paid=payAmt;inv.pending=+(final-payAmt).toFixed(2);
  db.invoices.push(inv);
  db.cashbook.push({id:'CB'+Date.now()+i,date:created,type:'in',no:'RCP-'+i,particulars:inv.desc,category:sub.type+' Payment',party:n[0],mode,amount:payAmt,by:inv.by,notes:'Invoice '+inv.no});
 });
 [['Rent',18000,'-15'],['Electricity',4200,'-10'],['Marketing',3000,'-6'],['Internet',999,'-4'],['Maintenance',1500,'-2'],['Tea',300,'0']].forEach((e,i)=>{
  db.cashbook.push({id:'CBX'+i,date:addDays(today(),parseInt(e[2])),type:'out',no:nextNo('voucher','VCH-'),particulars:e[0],category:e[0],party:'',mode:'Cash',amount:e[1],by:'Super Admin',notes:''})});
 save();audit('Demo Data Loaded','Sample clients, staff, invoices, expenses');toast('Demo data loaded!');go('dashboard')}

/* ================= INIT ================= */
(async function boot(){
 await initApiConfig();
 restoreAuth();
 if(AUTH.token&&AUTH.businessId){
  try{
   const source=await loadFromCloud();
   USER={u:AUTH.user.email,p:'',role:mapCloudRole(AUTH.user.role,AUTH.user.email,AUTH.user.name),name:AUTH.user.name,cloudRole:AUTH.user.role,jobType:AUTH.user.jobType};
   $('login').style.display='none';$('app').style.display='block';
   $('tb_user').textContent=USER.name+' · '+USER.role+' · cloud';
   $('sb_role').textContent=(db.settings&&db.settings.gymName)||'FITO6';
   buildNav();go('dashboard');refreshTopbarNotifs();
   if(source)toast('Session restored from cloud');
  }catch(e){
   clearAuth();_cloudReady=false;
   console.warn('Session restore failed',e);
  }
 }
 const pw=$('lg_p');if(pw)pw.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
 document.addEventListener('click',e=>{if(!e.target.closest('.tb-ico')&&!e.target.closest('.tb-drop'))closeTbDrops()});
})();

</script>
